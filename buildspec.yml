version: 0.2
 
env:
  variables:
    AWS_REGION: "ap-south-1"
    EKS_CLUSTER_NAME: "brain-tasks-cluster"
    IMAGE_NAME: "olivejoseph1/brain-tasks-app"
    IMAGE_TAG: "latest"
  # DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are set as secure
  # environment variables in the CodeBuild project console (not here)
 
phases:
  install:
    commands:
      - echo "Installing kubectl..."
      - curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
      - chmod +x ./kubectl
      - mv ./kubectl /usr/local/bin/kubectl
      - kubectl version --client
 
  pre_build:
    commands:
      - echo "Logging in to Docker Hub..."
      - echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
 
  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $IMAGE_NAME:$IMAGE_TAG .
 
  post_build:
    commands:
      - echo "Pushing image to Docker Hub..."
      - docker push $IMAGE_NAME:$IMAGE_TAG
 
      - echo "Updating kubeconfig for EKS..."
      - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
 
      - echo "Deploying to EKS..."
      - kubectl apply -f deployment.yml
      - kubectl apply -f service.yml
      - echo "Forcing rollout to pick up latest image..."
      - kubectl rollout restart deployment/brain-tasks-app
      - kubectl rollout status deployment/brain-tasks-app --timeout=120s
      - echo "Waiting for LoadBalancer to be provisioned..."
      - kubectl get svc brain-tasks-app-service -o wide
 
artifacts:
  files:
    - '**/*'
 
